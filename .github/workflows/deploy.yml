name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
        run: |
          bunx next telemetry disable
          bun run scripts/compress-images.ts || echo "::warning::Image compression skipped; using committed WebP assets"
          bunx next build

      - name: Prepare GitHub Pages artifact
        run: |
          test -f out/index.html || (echo "Missing out/index.html — build failed" && exit 1)
          cp public/.nojekyll out/.nojekyll
          test -f out/CNAME || cp public/CNAME out/CNAME
          echo "Pages artifact contents:"
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
