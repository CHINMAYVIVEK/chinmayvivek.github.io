# GitHub Pages only → https://chinmayvivek.github.io
# Deploys the build artifact via GitHub Actions (no commits back to the repo).
# Pages setting: Source → GitHub Actions (not "Deploy from branch").
# chinmayvivek.com is deployed separately via Docker — do not add a custom domain here.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://chinmayvivek.github.io
        run: |
          bunx next telemetry disable
          bun run scripts/compress-images.ts || echo "::warning::Image compression skipped; using committed WebP assets"
          bunx next build

      - name: Prepare Pages artifact
        run: |
          test -f out/index.html || (echo "Build failed: out/index.html missing" && exit 1)
          touch out/.nojekyll
          rm -f out/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
