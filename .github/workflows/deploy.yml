# Builds the Next.js static export and publishes it to the /docs folder on main.
# GitHub Pages setting: Deploy from a branch → main → /docs (not /root).
# .nojekyll disables Jekyll so README.md at repo root is not used as the site.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
        run: |
          bunx next telemetry disable
          bun run scripts/compress-images.ts || echo "::warning::Image compression skipped; using committed WebP assets"
          bunx next build

      - name: Verify build output
        run: |
          test -f out/index.html || (echo "Build failed: out/index.html missing" && exit 1)
          ls -la out/

      - name: Publish to docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r out/. docs/
          touch docs/.nojekyll
          test -f docs/index.html
          test -f docs/CNAME || cp public/CNAME docs/CNAME
          echo "docs/ ready for GitHub Pages (/docs folder)"

      - name: Commit and push docs/
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "chore: deploy site to docs/"
          file_pattern: docs/**
          branch: main
